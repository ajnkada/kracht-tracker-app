<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Kracht-tracker</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --tekst:#e2e8f0; --grijs:#64748b; --accent:#38bdf8; --paars:#a78bfa; --goud:#fbbf24; --groen:#34d399; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--tekst); font-family: system-ui, -apple-system, sans-serif; padding-bottom: 72px; -webkit-tap-highlight-color: transparent; }
    .scherm { max-width: 480px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .sub { color: var(--grijs); font-size: 13px; }
    .kaart { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .rij { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    label.veld { display:flex; flex-direction:column; font-size:11px; color:var(--grijs); gap:4px; }
    input, select { background:#0b1220; border:1px solid var(--line); color:var(--tekst); border-radius:8px; padding:10px; font-size:16px; width:100%; }
    button { background: var(--accent); color:#06263a; border:none; border-radius:8px; padding:10px 14px; font-size:14px; font-weight:600; cursor:pointer; }
    button.ghost { background: transparent; color: var(--accent); border:1.5px dashed var(--line); width:100%; padding:12px; }
    button.mini { padding:8px 10px; font-size:13px; }
    button.gevaar { background: transparent; color:#f87171; border:none; }
    .grijs { color: var(--grijs); font-size:12px; }
    .stat { flex:1; background:var(--card); border-radius:10px; padding:10px; text-align:center; }
    .stat b { font-size:18px; }
    .stat span { font-size:10px; color:var(--grijs); }
    nav { position: fixed; bottom:0; left:0; right:0; background:#0b1220; border-top:1px solid var(--line); display:flex; }
    nav button { flex:1; background:transparent; color:var(--grijs); border:none; border-radius:0; padding:12px 4px; font-size:12px; }
    nav button.actief { color: var(--accent); }
    .verborgen { display:none !important; }
    #login-scherm { display:none; max-width:480px; margin:0 auto; }
    body.uitgelogd #login-scherm { display:block; }
    body.uitgelogd main, body.uitgelogd nav, body.uitgelogd #rustklok, body.uitgelogd #viering { display:none !important; }
    .badge { display:inline-block; background:#0b1220; border:1px solid var(--line); color:var(--paars); font-size:11px; padding:1px 8px; border-radius:999px; vertical-align:middle; }
    .chip { display:inline-block; background:#0b1220; border:1px solid var(--line); color:var(--grijs); font-size:12px; padding:5px 11px; border-radius:999px; cursor:pointer; user-select:none; }
    .chip.aan { background:var(--paars); color:#1a1030; border-color:var(--paars); }
    .progtabel { width:100%; border-collapse:collapse; margin-top:14px; font-size:13px; }
    .progtabel th { text-align:left; color:var(--grijs); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.03em; padding:4px 6px; border-bottom:1px solid var(--line); }
    .progtabel td { padding:6px; border-bottom:1px solid #1e293b; }
    .prtag { color:var(--goud); font-size:10px; font-weight:700; border:1px solid var(--goud); border-radius:4px; padding:0 3px; vertical-align:middle; }
    #rustklok { position:fixed; left:0; right:0; bottom:47px; background:#0b1220; border-top:1px solid var(--line); padding:8px 12px; display:flex; align-items:center; gap:10px; z-index:40; max-width:480px; margin:0 auto; }
    #rustklok .tijd { font-size:18px; font-weight:700; font-variant-numeric:tabular-nums; min-width:64px; color:var(--accent); }
    #viering { position:fixed; top:0; left:0; right:0; z-index:60; display:flex; justify-content:center; align-items:flex-start; pointer-events:none; }
    .viering-banner { margin-top:18px; max-width:92%; background:var(--paars); color:#1a1030; font-weight:700; padding:10px 8px 10px 18px; border-radius:999px; box-shadow:0 6px 20px rgba(0,0,0,.45); animation:pop .3s ease; pointer-events:auto; display:flex; align-items:center; gap:8px; }
    .sluit { background:transparent; border:none; color:inherit; font-size:20px; line-height:1; padding:0 6px; cursor:pointer; opacity:.85; }
    .sluit:hover { opacity:1; }
    #opslag-fout { position:fixed; left:50%; transform:translateX(-50%); bottom:100px; background:#7f1d1d; color:#fff; padding:8px 14px; border-radius:999px; font-size:13px; z-index:70; box-shadow:0 4px 16px rgba(0,0,0,.4); max-width:90%; text-align:center; }
    .confetti { position:fixed; top:-12px; width:8px; height:13px; border-radius:2px; opacity:.9; animation:vallen linear forwards; }
    @keyframes vallen { to { transform:translateY(100vh) rotate(540deg); opacity:0; } }
    @keyframes pop { from { transform:scale(.6); opacity:0 } to { transform:scale(1); opacity:1 } }
  </style>
</head>
<body class="uitgelogd">
  <div id="login-scherm">
    <div style="max-width:360px;margin:0 auto;padding:48px 20px;text-align:center">
      <div style="font-size:56px">🏋️</div>
      <h1 style="margin-top:8px">Kracht-tracker</h1>
      <p class="sub">Log in met je e-mail — je krijgt een inloglink toegestuurd (geen wachtwoord nodig).</p>
      <input id="login-email" type="email" inputmode="email" autocomplete="email" placeholder="jouw@email.nl" style="margin-top:18px">
      <button style="margin-top:10px;width:100%" onclick="stuurInloglink()">Stuur inloglink</button>
      <p id="login-status" class="grijs" style="margin-top:14px;min-height:20px"></p>
    </div>
  </div>

  <main>
    <section id="tab-vandaag" class="scherm"></section>
    <section id="tab-oefeningen" class="scherm verborgen"></section>
    <section id="tab-voortgang" class="scherm verborgen"></section>
    <section id="tab-records" class="scherm verborgen"></section>
    <section id="tab-account" class="scherm verborgen"></section>
  </main>

  <div id="rustklok" class="verborgen"></div>
  <div id="viering" class="verborgen"></div>
  <div id="opslag-fout" class="verborgen"></div>

  <nav>
    <button data-tab="vandaag" class="actief" onclick="toonTab('vandaag')">📋 Vandaag</button>
    <button data-tab="oefeningen" onclick="toonTab('oefeningen')">💪 Oefeningen</button>
    <button data-tab="voortgang" onclick="toonTab('voortgang')">📈 Voortgang</button>
    <button data-tab="records" onclick="toonTab('records')">🏅 Records</button>
    <button data-tab="account" onclick="toonTab('account')">👤 Account</button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  // ===== LOGIC START =====
  // Geschatte 1RM volgens Epley: gewicht x (1 + reps/30)
  function geschatte1RM(kg, reps) {
    return kg * (1 + reps / 30);
  }

  // Hoogste geschatte 1RM over alle sets van een oefening in één sessie
  function besteSet1RM(sets) {
    if (!sets || sets.length === 0) return 0;
    return Math.max(...sets.map(s => geschatte1RM(s.kg, s.reps)));
  }

  // Grafiekpunten voor één oefening: [{ datum, e1rm, gewicht, isPR }] op datum oplopend.
  // e1rm = geschatte 1RM van de beste set; gewicht = zwaarste kg van die sessie.
  // isPR = geschatte 1RM is strikt hoger dan alle eerdere sessies.
  function progressieVoorOefening(sessies, exerciseId) {
    const relevant = sessies
      .filter(s => s.oefeningen.some(o => o.exerciseId === exerciseId && o.sets.length > 0))
      .slice()
      .sort((a, b) => a.datum < b.datum ? -1 : a.datum > b.datum ? 1 : 0);
    let max = -Infinity, maxGewicht = -Infinity;
    const punten = [];
    for (const s of relevant) {
      const o = s.oefeningen.find(o => o.exerciseId === exerciseId);
      const e1rm = besteSet1RM(o.sets);
      const gewicht = Math.max(...o.sets.map(x => x.kg));
      const isPR = e1rm > max;
      if (isPR) max = e1rm;
      const isGewichtPR = gewicht > maxGewicht;
      if (isGewichtPR) maxGewicht = gewicht;
      punten.push({ datum: s.datum, e1rm, gewicht, isPR, isGewichtPR });
    }
    return punten;
  }

  // Beste records voor één oefening, of null als er geen data is.
  // { beste1rm, beste1rmDatum, besteGewicht, besteGewichtDatum }
  function recordsVoorOefening(sessies, exerciseId) {
    let beste1rm = 0, beste1rmDatum = null, besteGewicht = 0, besteGewichtDatum = null;
    for (const s of sessies) {
      const o = s.oefeningen.find(o => o.exerciseId === exerciseId);
      if (!o || o.sets.length === 0) continue;
      const e = besteSet1RM(o.sets);
      const g = Math.max(...o.sets.map(x => x.kg));
      if (e > beste1rm) { beste1rm = e; beste1rmDatum = s.datum; }
      if (g > besteGewicht) { besteGewicht = g; besteGewichtDatum = s.datum; }
    }
    if (beste1rmDatum === null) return null;
    return { beste1rm, beste1rmDatum, besteGewicht, besteGewichtDatum };
  }

  // Is nieuweE1rm een nieuw persoonlijk record? Alleen true als er al eerdere
  // sets bestaan én de nieuwe waarde strikt hoger is dan alle bestaande.
  function isNieuwePR(sessies, exerciseId, nieuweE1rm) {
    let besteBestaand = 0, aantal = 0;
    for (const s of sessies) {
      const o = s.oefeningen.find(o => o.exerciseId === exerciseId);
      if (!o) continue;
      for (const st of o.sets) { aantal++; const e = geschatte1RM(st.kg, st.reps); if (e > besteBestaand) besteBestaand = e; }
    }
    return aantal > 0 && nieuweE1rm > besteBestaand;
  }

  // Nieuw gewicht-PR? Alleen als er al eerdere kg-sets zijn én het nieuwe gewicht
  // strikt zwaarder is dan alle bestaande.
  function isNieuwGewichtPR(sessies, exerciseId, nieuwGewicht) {
    let beste = 0, aantal = 0;
    for (const s of sessies) {
      const o = s.oefeningen.find(o => o.exerciseId === exerciseId);
      if (!o) continue;
      for (const st of o.sets) { if (st.kg !== undefined) { aantal++; if (st.kg > beste) beste = st.kg; } }
    }
    return aantal > 0 && nieuwGewicht > beste;
  }

  // Laatste set van deze oefening uit de meest recente sessie vóór huidigeDatum, of null.
  function vorigeSet(sessies, exerciseId, huidigeDatum) {
    const eerder = sessies
      .filter(s => s.datum < huidigeDatum && s.oefeningen.some(o => o.exerciseId === exerciseId && o.sets.length > 0))
      .slice()
      .sort((a, b) => a.datum < b.datum ? 1 : a.datum > b.datum ? -1 : 0);
    if (eerder.length === 0) return null;
    const o = eerder[0].oefeningen.find(o => o.exerciseId === exerciseId);
    return o.sets[o.sets.length - 1];
  }

  // Rond af op 1 decimaal, strip ",0" en gebruik Nederlandse komma.
  function formatKg(x) {
    const r = Math.round(x * 10) / 10;
    let s = r.toFixed(1);
    if (s.endsWith('.0')) s = s.slice(0, -2);
    return s.replace('.', ',');
  }

  // ---- Tijd-oefeningen (bijv. plank), gemeten in seconden ----
  // Langste hold (seconden) van een oefening in één sessie.
  function besteTijd(sets) {
    if (!sets || sets.length === 0) return 0;
    return Math.max(...sets.map(s => s.seconden || 0));
  }
  // Grafiekpunten voor een tijd-oefening: [{ datum, seconden, isPR }] op datum oplopend.
  function progressieTijdVoorOefening(sessies, exerciseId) {
    const relevant = sessies
      .filter(s => s.oefeningen.some(o => o.exerciseId === exerciseId && o.sets.length > 0))
      .slice()
      .sort((a, b) => a.datum < b.datum ? -1 : a.datum > b.datum ? 1 : 0);
    let max = -Infinity;
    const punten = [];
    for (const s of relevant) {
      const o = s.oefeningen.find(o => o.exerciseId === exerciseId);
      const seconden = besteTijd(o.sets);
      const isPR = seconden > max;
      if (isPR) max = seconden;
      punten.push({ datum: s.datum, seconden, isPR });
    }
    return punten;
  }
  // Beste tijd-record voor een oefening, of null. { besteTijd, besteTijdDatum }
  function recordsTijdVoorOefening(sessies, exerciseId) {
    let beste = 0, besteDatum = null;
    for (const s of sessies) {
      const o = s.oefeningen.find(o => o.exerciseId === exerciseId);
      if (!o || o.sets.length === 0) continue;
      const t = besteTijd(o.sets);
      if (t > beste) { beste = t; besteDatum = s.datum; }
    }
    if (besteDatum === null) return null;
    return { besteTijd: beste, besteTijdDatum: besteDatum };
  }
  // Nieuw tijd-PR? Alleen als er al eerdere tijd-sets zijn én de nieuwe langer is.
  function isNieuweTijdPR(sessies, exerciseId, nieuweSeconden) {
    let besteBestaand = 0, aantal = 0;
    for (const s of sessies) {
      const o = s.oefeningen.find(o => o.exerciseId === exerciseId);
      if (!o) continue;
      for (const st of o.sets) { aantal++; const t = st.seconden || 0; if (t > besteBestaand) besteBestaand = t; }
    }
    return aantal > 0 && nieuweSeconden > besteBestaand;
  }
  // Seconden als "45s" (onder de minuut) of "1:30".
  function formatTijd(sec) {
    sec = Math.round(sec);
    if (sec < 60) return sec + 's';
    return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
  }
  // ===== LOGIC END =====
  let geselecteerdeOefeningId = null;
  let geselecteerdeDatum = null; // welke dag toont/logt de Vandaag-tab (default: vandaag)

  // Escape tekst die via innerHTML wordt ingevoegd (bijv. oefeningnamen met " of <)
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }
  // Eén of meer spiergroep-badges naast elkaar.
  function badgesHtml(groepen) {
    return (groepen || []).map(g => `<span class="badge">${escapeHtml(g)}</span>`).join(' ');
  }
  function toggleChip(el) { el.classList.toggle('aan'); }

  // ---- Opslag (localStorage) ----
  const SPIERGROEPEN = ['Bicep','Tricep','Borst','Rug','Schouders','Benen','Billen','Buik','Onderarmen'];
  const STARTLIJST = [
    { naam: 'Bankdrukken', spiergroepen: ['Borst','Tricep'] },
    { naam: 'Incline bankdrukken', spiergroepen: ['Borst','Schouders'] },
    { naam: 'Dumbbell press', spiergroepen: ['Borst','Tricep'] },
    { naam: 'Push-up', spiergroepen: ['Borst','Tricep','Buik'] },
    { naam: 'Cable fly', spiergroepen: ['Borst'] },
    { naam: 'Deadlift', spiergroepen: ['Rug','Benen','Billen'] },
    { naam: 'Lat pulldown', spiergroepen: ['Rug','Bicep'] },
    { naam: 'Barbell row', spiergroepen: ['Rug','Bicep'] },
    { naam: 'Pull-up', spiergroepen: ['Rug','Bicep'] },
    { naam: 'Seated row', spiergroepen: ['Rug','Bicep'] },
    { naam: 'Squat', spiergroepen: ['Benen','Billen'] },
    { naam: 'Leg press', spiergroepen: ['Benen','Billen'] },
    { naam: 'Lunge', spiergroepen: ['Benen','Billen'] },
    { naam: 'Leg extension', spiergroepen: ['Benen'] },
    { naam: 'Leg curl', spiergroepen: ['Benen'] },
    { naam: 'Hip thrust', spiergroepen: ['Billen','Benen'] },
    { naam: 'Romanian deadlift', spiergroepen: ['Billen','Rug','Benen'] },
    { naam: 'Bulgarian split squat', spiergroepen: ['Billen','Benen'] },
    { naam: 'Glute bridge', spiergroepen: ['Billen'] },
    { naam: 'Schouderpers', spiergroepen: ['Schouders','Tricep'] },
    { naam: 'Lateral raise', spiergroepen: ['Schouders'] },
    { naam: 'Front raise', spiergroepen: ['Schouders'] },
    { naam: 'Reverse fly', spiergroepen: ['Schouders','Rug'] },
    { naam: 'Arnold press', spiergroepen: ['Schouders','Tricep'] },
    { naam: 'Biceps curl', spiergroepen: ['Bicep'] },
    { naam: 'Hammer curl', spiergroepen: ['Bicep','Onderarmen'] },
    { naam: 'Preacher curl', spiergroepen: ['Bicep'] },
    { naam: 'Concentration curl', spiergroepen: ['Bicep'] },
    { naam: 'Triceps pushdown', spiergroepen: ['Tricep'] },
    { naam: 'Skull crusher', spiergroepen: ['Tricep'] },
    { naam: 'Overhead extension', spiergroepen: ['Tricep'] },
    { naam: 'Dips', spiergroepen: ['Tricep','Borst'] },
    { naam: 'Plank', spiergroepen: ['Buik'], type: 'tijd' },
    { naam: 'Side plank', spiergroepen: ['Buik'], type: 'tijd' },
    { naam: 'Crunch', spiergroepen: ['Buik'] },
    { naam: 'Leg raise', spiergroepen: ['Buik'] },
    { naam: 'Mountain climber', spiergroepen: ['Buik'] },
    { naam: 'Wrist curl', spiergroepen: ['Onderarmen'] },
    { naam: 'Reverse wrist curl', spiergroepen: ['Onderarmen'] },
    { naam: "Farmer's walk", spiergroepen: ['Onderarmen','Billen'], type: 'tijd' },
    { naam: 'Dead hang', spiergroepen: ['Onderarmen'], type: 'tijd' },
    { naam: 'Reverse curl', spiergroepen: ['Onderarmen','Bicep'] },
  ];
  // Verhoog dit als de startlijst wijzigt; nieuwe oefeningen worden dan eenmalig
  // bijgeplaatst bij bestaande gebruikers (zonder hun eigen lijst te wissen).
  const STARTLIJST_VERSIE = 1;

  function nieuwId() {
    return crypto.randomUUID();
  }
  function vandaagISO() {
    return new Date().toISOString().slice(0, 10);
  }

  // ---- Opslag via Supabase, met in-memory cache zodat de UI-code sync blijft ----
  let cacheOefeningen = [];
  let cacheSessies = [];

  function laadOefeningen() { return cacheOefeningen; }
  function laadSessies() { return cacheSessies; }

  function bewaarOefeningen(arr) {
    cacheOefeningen = arr;
    const uid = huidigeGebruiker && huidigeGebruiker.id;
    if (!uid || arr.length === 0) return;
    const rows = arr.map(o => ({
      id: o.id, user_id: uid, naam: o.naam,
      spiergroepen: o.spiergroepen || [], type: o.type || 'reps',
      doel: (o.doel === undefined ? null : o.doel)
    }));
    sb.from('exercises').upsert(rows).then(({ error }) => { if (error) meldOpslagfout(error); });
  }

  function bewaarSessies(arr) {
    cacheSessies = arr;
    const uid = huidigeGebruiker && huidigeGebruiker.id;
    if (!uid || arr.length === 0) return;
    const rows = arr.map(s => ({ id: s.id, user_id: uid, datum: s.datum, oefeningen: s.oefeningen || [] }));
    sb.from('sessions').upsert(rows).then(({ error }) => { if (error) meldOpslagfout(error); });
  }

  // Alle data van de ingelogde gebruiker uit de cloud in de cache laden.
  async function laadAllesUitCloud() {
    const uid = huidigeGebruiker.id;
    const [oefRes, sessRes] = await Promise.all([
      sb.from('exercises').select('*').eq('user_id', uid),
      sb.from('sessions').select('*').eq('user_id', uid),
    ]);
    if (oefRes.error) meldOpslagfout(oefRes.error);
    if (sessRes.error) meldOpslagfout(sessRes.error);
    cacheOefeningen = (oefRes.data || []).map(r => {
      const o = { id: r.id, naam: r.naam, spiergroepen: r.spiergroepen || [], type: r.type || 'reps' };
      if (r.doel !== null && r.doel !== undefined) o.doel = Number(r.doel);
      return o;
    });
    cacheSessies = (sessRes.data || []).map(r => ({ id: r.id, datum: r.datum, oefeningen: r.oefeningen || [] }));
  }

  function zaaiStartlijst() {
    if (laadOefeningen().length === 0) {
      bewaarOefeningen(STARTLIJST.map(o => ({ id: nieuwId(), naam: o.naam, spiergroepen: o.spiergroepen.slice(), type: o.type || 'reps' })));
    }
  }

  function meldOpslagfout(error) {
    console.error('Supabase-opslag mislukt:', error);
    const el = document.getElementById('opslag-fout');
    if (el) {
      el.textContent = '⚠️ Opslaan/laden mislukt — controleer je verbinding';
      el.classList.remove('verborgen');
      clearTimeout(meldOpslagfout._t);
      meldOpslagfout._t = setTimeout(() => el.classList.add('verborgen'), 5000);
    }
  }

  // ---- Sessie-helpers ----
  function sessieOpDatum(datum) {
    return laadSessies().find(s => s.datum === datum) || null;
  }
  function zorgVoorSessieOpDatum(datum) {
    const sessies = laadSessies();
    let s = sessies.find(x => x.datum === datum);
    if (!s) { s = { id: nieuwId(), datum, oefeningen: [] }; sessies.push(s); bewaarSessies(sessies); }
    return s;
  }
  function zorgVoorSessieVandaag() { return zorgVoorSessieOpDatum(vandaagISO()); }

  // ---- Datumnavigatie (Vandaag-tab) ----
  function verschuifDatum(iso, dagen) {
    const d = new Date(iso + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + dagen);
    return d.toISOString().slice(0, 10);
  }
  function wijzigDatum(dagen) {
    let n = verschuifDatum(geselecteerdeDatum, dagen);
    if (n > vandaagISO()) n = vandaagISO(); // niet in de toekomst loggen
    geselecteerdeDatum = n;
    renderVandaag();
  }
  function kiesDatum(v) {
    if (!v) return;
    geselecteerdeDatum = v > vandaagISO() ? vandaagISO() : v;
    renderVandaag();
  }

  function toonTab(naam) {
    for (const s of document.querySelectorAll('main > section')) s.classList.add('verborgen');
    document.getElementById('tab-' + naam).classList.remove('verborgen');
    for (const b of document.querySelectorAll('nav button')) {
      b.classList.toggle('actief', b.dataset.tab === naam);
    }
    if (naam === 'vandaag') renderVandaag();
    if (naam === 'oefeningen') renderOefeningen();
    if (naam === 'voortgang') renderVoortgang();
    if (naam === 'records') renderRecords();
    if (naam === 'account') renderAccount();
  }

  function renderAccount() {
    const email = huidigeGebruiker ? huidigeGebruiker.email : '';
    document.getElementById('tab-account').innerHTML = `
      <h1>Account</h1>
      <div class="kaart" style="margin-top:12px">
        <div class="grijs">Ingelogd als</div>
        <div style="font-weight:600;word-break:break-all">${escapeHtml(email)}</div>
      </div>
      <button class="ghost" style="width:100%;margin-top:8px;color:#f87171;border-color:#f87171" onclick="uitloggen()">Uitloggen</button>
    `;
  }

  function datumKort(iso) {
    return new Date(iso + 'T00:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
  }

  function renderVandaag() {
    if (!geselecteerdeDatum) geselecteerdeDatum = vandaagISO();
    const isVandaag = geselecteerdeDatum === vandaagISO();
    const sessie = sessieOpDatum(geselecteerdeDatum);
    const alleOef = laadOefeningen();
    const oefVan = id => alleOef.find(o => o.id === id) || {};
    const sessies = laadSessies();

    let kaarten = '';
    if (sessie && sessie.oefeningen.length > 0) {
      kaarten = sessie.oefeningen.map(o => {
        const ex = oefVan(o.exerciseId);
        const isTijd = ex.type === 'tijd';
        const vorige = vorigeSet(sessies, o.exerciseId, geselecteerdeDatum);
        const vorigeTekst = vorige
          ? (isTijd ? `vorige: ${formatTijd(vorige.seconden)}` : `vorige: ${formatKg(vorige.kg)} kg × ${vorige.reps}`)
          : 'geen eerdere data';
        const setRijen = o.sets.map((s, i) => `
          <div class="rij grijs" style="padding:3px 0">
            <span>Set ${i + 1}</span><span>${isTijd ? formatTijd(s.seconden) : `${formatKg(s.kg)} kg × ${s.reps}`}</span>
          </div>`).join('');
        const invoer = isTijd
          ? `<label class="veld" style="flex:1">seconden<input id="sec-${o.exerciseId}" type="number" inputmode="numeric"></label>`
          : `<label class="veld" style="flex:1">kg<input id="kg-${o.exerciseId}" type="number" inputmode="decimal" step="0.5"></label>
              <label class="veld" style="flex:1">reps<input id="reps-${o.exerciseId}" type="number" inputmode="numeric"></label>`;
        return `
          <div class="kaart">
            <div class="rij"><span><b>🏋️ ${escapeHtml(ex.naam || 'onbekend')}</b> ${badgesHtml(ex.spiergroepen)}</span><span class="grijs">${vorigeTekst}</span></div>
            ${setRijen}
            <div class="rij" style="margin-top:10px;gap:8px">
              ${invoer}
              <button class="mini" style="align-self:flex-end" onclick="voegSetToe('${o.exerciseId}')">+ set</button>
            </div>
          </div>`;
      }).join('');
    }

    const alGekozen = sessie ? sessie.oefeningen.map(o => o.exerciseId) : [];
    const opties = alleOef.filter(o => !alGekozen.includes(o.id))
      .map(o => `<option value="${o.id}">${escapeHtml(o.naam)}${o.spiergroepen && o.spiergroepen.length ? ' — ' + escapeHtml(o.spiergroepen.join(', ')) : ''}</option>`).join('');
    const picker = opties ? `
      <div class="rij" style="gap:8px;margin-top:8px">
        <select id="oefening-keuze" style="flex:1">${opties}</select>
        <button onclick="voegOefeningToe()">+ Oefening</button>
      </div>` : '<p class="grijs">Alle oefeningen zitten al in deze sessie.</p>';

    const datumLabel = new Date(geselecteerdeDatum + 'T00:00:00').toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
    document.getElementById('tab-vandaag').innerHTML = `
      <div class="rij" style="gap:8px;align-items:center">
        <button class="mini" onclick="wijzigDatum(-1)" aria-label="dag terug">‹</button>
        <input type="date" id="datum-kiezer" value="${geselecteerdeDatum}" max="${vandaagISO()}" onchange="kiesDatum(this.value)" style="flex:1;text-align:center">
        <button class="mini" onclick="wijzigDatum(1)" aria-label="dag vooruit"${isVandaag ? ' disabled style="opacity:.35"' : ''}>›</button>
      </div>
      <p class="sub" style="margin-top:6px">${datumLabel}${isVandaag ? ' · vandaag' : ''}</p>
      <div style="margin-top:14px">${kaarten || `<p class="grijs">Nog niets gelogd${isVandaag ? ' vandaag' : ' op deze dag'}. Voeg een oefening toe 👇</p>`}</div>
      ${picker}
    `;
  }

  function voegOefeningToe() {
    const keuze = document.getElementById('oefening-keuze');
    if (!keuze || !keuze.value) return;
    const sessie = zorgVoorSessieOpDatum(geselecteerdeDatum);
    const sessies = laadSessies();
    const s = sessies.find(x => x.id === sessie.id);
    if (!s.oefeningen.some(o => o.exerciseId === keuze.value)) {
      s.oefeningen.push({ exerciseId: keuze.value, sets: [] });
      bewaarSessies(sessies);
    }
    renderVandaag();
  }

  function voegSetToe(exerciseId) {
    const ex = laadOefeningen().find(o => o.id === exerciseId) || {};
    const isTijd = ex.type === 'tijd';
    const sessiesNu = laadSessies();
    let nieuweSet, pr = false, prTekst = '';
    if (isTijd) {
      const sec = parseInt(document.getElementById('sec-' + exerciseId).value, 10);
      if (!(sec > 0)) return;
      nieuweSet = { seconden: sec };
      if (isNieuweTijdPR(sessiesNu, exerciseId, sec)) { pr = true; prTekst = formatTijd(sec); }
    } else {
      const kg = parseFloat(document.getElementById('kg-' + exerciseId).value);
      const reps = parseInt(document.getElementById('reps-' + exerciseId).value, 10);
      if (!(kg > 0) || !(reps > 0)) return;
      nieuweSet = { kg, reps };
      const delen = [];
      if (isNieuwePR(sessiesNu, exerciseId, geschatte1RM(kg, reps))) delen.push(`1RM ${formatKg(geschatte1RM(kg, reps))} kg`);
      if (isNieuwGewichtPR(sessiesNu, exerciseId, kg)) delen.push(`zwaarste ${formatKg(kg)} kg`);
      if (delen.length) { pr = true; prTekst = delen.join(' · '); }
    }
    zorgVoorSessieOpDatum(geselecteerdeDatum);
    const sessies = laadSessies();
    const s = sessies.find(x => x.datum === geselecteerdeDatum);
    let o = s.oefeningen.find(o => o.exerciseId === exerciseId);
    if (!o) { o = { exerciseId, sets: [] }; s.oefeningen.push(o); }
    o.sets.push(nieuweSet);
    bewaarSessies(sessies);
    renderVandaag();
    if (pr) vierPR(ex.naam || 'oefening', prTekst);
    if (geselecteerdeDatum === vandaagISO()) startRust(90); // rust alleen bij loggen van vandaag
  }
  function renderOefeningen() {
    const lijst = laadOefeningen();
    const items = lijst.map(o => `
      <div class="kaart rij">
        <span>💪 ${escapeHtml(o.naam)} ${badgesHtml(o.spiergroepen)}${o.type === 'tijd' ? ' <span class="badge" style="color:var(--accent)">⏱️ tijd</span>' : ''}</span>
        <button class="gevaar mini" onclick="verwijderOefening('${o.id}')">verwijderen</button>
      </div>`).join('');
    const groepChips = SPIERGROEPEN.map(g => `<span class="chip" data-groep="${g}" onclick="toggleChip(this)">${g}</span>`).join(' ');
    document.getElementById('tab-oefeningen').innerHTML = `
      <h1>Oefeningen</h1>
      <p class="sub">Kies bij "Vandaag" uit deze lijst, of voeg hier je eigen oefening toe.</p>
      <div style="margin:14px 0">
        <label class="veld">Nieuwe oefening
          <input id="nieuwe-oefening" placeholder="bijv. Romanian deadlift">
        </label>
        <div style="font-size:11px;color:var(--grijs);margin:10px 0 6px">Spiergroep(en) — tik aan wat past</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">${groepChips}</div>
        <label class="veld" style="margin-top:10px">Meten in
          <select id="nieuwe-type">
            <option value="reps">herhalingen (kg × reps)</option>
            <option value="tijd">seconden (bijv. plank)</option>
          </select>
        </label>
        <button style="margin-top:10px;width:100%" onclick="voegEigenOefeningToe()">+ Oefening toevoegen</button>
      </div>
      ${items || '<p class="grijs">Nog geen oefeningen.</p>'}
    `;
  }

  function voegEigenOefeningToe() {
    const naam = document.getElementById('nieuwe-oefening').value.trim();
    if (!naam) return;
    const groepen = [...document.querySelectorAll('#tab-oefeningen .chip.aan')].map(el => el.dataset.groep);
    if (groepen.length === 0) { alert('Kies minstens één spiergroep.'); return; }
    const type = document.getElementById('nieuwe-type').value;
    const lijst = laadOefeningen();
    lijst.push({ id: nieuwId(), naam, spiergroepen: groepen, type });
    bewaarOefeningen(lijst);
    renderOefeningen();
  }

  function verwijderOefening(id) {
    bewaarOefeningen(laadOefeningen().filter(o => o.id !== id));
    // ook echt uit de database verwijderen (upsert dekt geen deletes)
    sb.from('exercises').delete().eq('id', id).then(({ error }) => { if (error) meldOpslagfout(error); });
    // haal de oefening ook uit de sessie van vandaag, anders blijft er een "onbekend"-kaart staan
    const sessies = laadSessies();
    const vandaag = sessies.find(s => s.datum === vandaagISO());
    if (vandaag) {
      vandaag.oefeningen = vandaag.oefeningen.filter(o => o.exerciseId !== id);
      bewaarSessies(sessies);
    }
    renderOefeningen();
  }
  function tekenGrafiek(punten, doel) {
    const w = 300, h = 130, pad = 18;
    if (punten.length === 0) return '';
    // beide series delen dezelfde kg-as, zodat de lijnen door elkaar lopen
    const vals = punten.flatMap(p => [p.e1rm, p.gewicht]);
    if (doel > 0) vals.push(doel);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = (max - min) || 1;
    const n = punten.length;
    const x = i => n === 1 ? w / 2 : pad + i * (w - 2 * pad) / (n - 1);
    const y = v => pad + (1 - (v - min) / range) * (h - 2 * pad);
    const doelLijn = doel > 0 ? `<line x1="${pad}" y1="${y(doel)}" x2="${w - pad}" y2="${y(doel)}" stroke="#34d399" stroke-width="1.5" stroke-dasharray="2 3"/><text x="${w - pad}" y="${y(doel) - 4}" fill="#34d399" font-size="9" text-anchor="end">doel ${formatKg(doel)}</text>` : '';
    const lijnGewicht = `<polyline points="${punten.map((p,i) => `${x(i)},${y(p.gewicht)}`).join(' ')}" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5 4" stroke-linecap="round" stroke-linejoin="round"/>`;
    const dotsGewicht = punten.map((p,i) => `<circle cx="${x(i)}" cy="${y(p.gewicht)}" r="2.5" fill="#38bdf8"/>`).join('');
    const lijn1rm = `<polyline points="${punten.map((p,i) => `${x(i)},${y(p.e1rm)}`).join(' ')}" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;
    const dots1rm = punten.map((p,i) => `<circle cx="${x(i)}" cy="${y(p.e1rm)}" r="${p.isPR ? 5 : 3.5}" fill="${p.isPR ? '#fbbf24' : '#a78bfa'}"/>`).join('');
    return `<svg viewBox="0 0 ${w} ${h}" width="100%" xmlns="http://www.w3.org/2000/svg">${doelLijn}${lijnGewicht}${dotsGewicht}${lijn1rm}${dots1rm}</svg>`;
  }

  // Enkele lijn (langste hold in seconden) voor tijd-oefeningen.
  function tekenGrafiekTijd(punten, doel) {
    const w = 300, h = 130, pad = 18;
    if (punten.length === 0) return '';
    const vals = punten.map(p => p.seconden);
    if (doel > 0) vals.push(doel);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = (max - min) || 1;
    const n = punten.length;
    const x = i => n === 1 ? w / 2 : pad + i * (w - 2 * pad) / (n - 1);
    const y = v => pad + (1 - (v - min) / range) * (h - 2 * pad);
    const doelLijn = doel > 0 ? `<line x1="${pad}" y1="${y(doel)}" x2="${w - pad}" y2="${y(doel)}" stroke="#34d399" stroke-width="1.5" stroke-dasharray="2 3"/><text x="${w - pad}" y="${y(doel) - 4}" fill="#34d399" font-size="9" text-anchor="end">doel ${formatTijd(doel)}</text>` : '';
    const lijn = `<polyline points="${punten.map((p,i) => `${x(i)},${y(p.seconden)}`).join(' ')}" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;
    const dots = punten.map((p,i) => `<circle cx="${x(i)}" cy="${y(p.seconden)}" r="${p.isPR ? 5 : 3.5}" fill="${p.isPR ? '#fbbf24' : '#a78bfa'}"/>`).join('');
    return `<svg viewBox="0 0 ${w} ${h}" width="100%" xmlns="http://www.w3.org/2000/svg">${doelLijn}${lijn}${dots}</svg>`;
  }

  function renderVoortgang() {
    const oef = laadOefeningen();
    if (geselecteerdeOefeningId === null && oef.length > 0) geselecteerdeOefeningId = oef[0].id;
    const huidigeOef = oef.find(o => o.id === geselecteerdeOefeningId) || null;
    const isTijd = !!huidigeOef && huidigeOef.type === 'tijd';
    const doel = huidigeOef && huidigeOef.doel ? huidigeOef.doel : 0;
    const opties = oef.map(o => `<option value="${o.id}" ${o.id === geselecteerdeOefeningId ? 'selected' : ''}>${escapeHtml(o.naam)}</option>`).join('');
    const punten = !geselecteerdeOefeningId ? []
      : (isTijd ? progressieTijdVoorOefening(laadSessies(), geselecteerdeOefeningId)
                : progressieVoorOefening(laadSessies(), geselecteerdeOefeningId));

    let inhoud;
    if (punten.length === 0) {
      inhoud = '<p class="grijs" style="margin-top:16px">Nog geen data voor deze oefening. Log eerst een set bij "Vandaag".</p>';
    } else if (isTijd) {
      const laatste = punten[punten.length - 1].seconden;
      const delta = punten.length >= 2 ? laatste - punten[punten.length - 2].seconden : 0;
      const prs = punten.filter(p => p.isPR).length;
      const deltaTekst = delta > 0 ? `<span style="color:var(--groen)">▲ +${delta}s</span>`
        : delta < 0 ? `<span style="color:#f87171">▼ ${delta}s</span>`
        : '<span class="grijs">gelijk</span>';
      const doelPct = doel > 0 ? `<div class="grijs" style="margin:2px 0 10px">🎯 doel: ${formatTijd(laatste)} / ${formatTijd(doel)} · ${Math.round(laatste / doel * 100)}%</div>` : '';
      inhoud = `
        <div style="margin-top:12px">
          <div class="rij" style="justify-content:flex-start;gap:10px;align-items:baseline">
            <span style="font-size:30px;font-weight:800">${formatTijd(laatste)}</span>
            ${deltaTekst}
          </div>
          <div class="grijs" style="margin-bottom:${doel > 0 ? '2px' : '10px'}">langste hold · t.o.v. vorige sessie</div>
          ${doelPct}
          ${tekenGrafiekTijd(punten, doel)}
          <div style="display:flex;gap:14px;margin-top:6px;font-size:11px;flex-wrap:wrap">
            <span style="color:#a78bfa">▬ langste hold</span>
            <span style="color:#fbbf24">● PR</span>
            ${doel > 0 ? '<span style="color:#34d399">╌ doel</span>' : ''}
          </div>
          <div class="rij" style="gap:8px;margin-top:14px">
            <div class="stat"><b>${punten.length}</b><br><span>sessies</span></div>
            <div class="stat"><b>${prs}</b><br><span>PR's 🏅</span></div>
          </div>
          <table class="progtabel">
            <thead><tr><th>tijd</th><th>datum</th></tr></thead>
            <tbody>${punten.slice().reverse().map(p => `<tr><td>${formatTijd(p.seconden)}${p.isPR ? ' 🏅' : ''}</td><td class="grijs">${datumKort(p.datum)}</td></tr>`).join('')}</tbody>
          </table>
        </div>`;
    } else {
      const laatste = punten[punten.length - 1].e1rm;
      const delta = punten.length >= 2 ? laatste - punten[punten.length - 2].e1rm : 0;
      const prs = punten.filter(p => p.isPR).length;
      const deltaTekst = delta > 0 ? `<span style="color:var(--groen)">▲ +${formatKg(delta)} kg</span>`
        : delta < 0 ? `<span style="color:#f87171">▼ ${formatKg(delta)} kg</span>`
        : '<span class="grijs">gelijk</span>';
      const doelPct = doel > 0 ? `<div class="grijs" style="margin:2px 0 10px">🎯 doel: ${formatKg(laatste)} / ${formatKg(doel)} kg · ${Math.round(laatste / doel * 100)}%</div>` : '';
      inhoud = `
        <div style="margin-top:12px">
          <div class="rij" style="justify-content:flex-start;gap:10px;align-items:baseline">
            <span style="font-size:30px;font-weight:800">${formatKg(laatste)}<span class="grijs" style="font-size:15px"> kg</span></span>
            ${deltaTekst}
          </div>
          <div class="grijs" style="margin-bottom:${doel > 0 ? '2px' : '10px'}">geschatte kracht (1RM) · t.o.v. vorige sessie</div>
          ${doelPct}
          ${tekenGrafiek(punten, doel)}
          <div style="display:flex;gap:14px;margin-top:6px;font-size:11px;flex-wrap:wrap">
            <span style="color:#a78bfa">▬ geschatte 1RM</span>
            <span style="color:#38bdf8">╌ werkelijk gewicht</span>
            <span style="color:#fbbf24">● PR</span>
            ${doel > 0 ? '<span style="color:#34d399">╌ doel</span>' : ''}
          </div>
          <div class="rij" style="gap:8px;margin-top:14px">
            <div class="stat"><b>${punten.length}</b><br><span>sessies</span></div>
            <div class="stat"><b>${prs}</b><br><span>PR's 🏅</span></div>
          </div>
          <table class="progtabel">
            <thead><tr><th>kg</th><th>1RM</th><th>datum</th></tr></thead>
            <tbody>${punten.slice().reverse().map(p => `<tr><td>${formatKg(p.gewicht)}${p.isGewichtPR ? ' <span class="prtag">PR</span>' : ''}</td><td>${formatKg(p.e1rm)}${p.isPR ? ' 🏅' : ''}</td><td class="grijs">${datumKort(p.datum)}</td></tr>`).join('')}</tbody>
          </table>
        </div>`;
    }

    const doelBlok = huidigeOef ? `
      <div style="margin-top:16px">
        <label class="veld">🎯 Doel (${isTijd ? 'in seconden' : 'geschatte 1RM in kg'})
          <div class="rij" style="gap:8px">
            <input id="doel-input" type="number" inputmode="${isTijd ? 'numeric' : 'decimal'}" step="${isTijd ? '1' : '0.5'}" value="${doel || ''}" placeholder="${isTijd ? 'bijv. 90' : 'bijv. 110'}" style="flex:1">
            <button class="mini" onclick="stelDoelIn('${geselecteerdeOefeningId}')">opslaan</button>
          </div>
        </label>
      </div>` : '';

    document.getElementById('tab-voortgang').innerHTML = `
      <h1>Voortgang</h1>
      <select onchange="geselecteerdeOefeningId=this.value; renderVoortgang()" style="margin-top:10px">${opties}</select>
      ${inhoud}
      ${doelBlok}
    `;
  }

  function stelDoelIn(id) {
    const v = parseFloat(document.getElementById('doel-input').value);
    const lijst = laadOefeningen();
    const o = lijst.find(x => x.id === id);
    if (!o) return;
    if (v > 0) o.doel = v; else delete o.doel;
    bewaarOefeningen(lijst);
    renderVoortgang();
  }

  function renderRecords() {
    const oef = laadOefeningen();
    const sessies = laadSessies();
    const kaarten = oef.map(o => {
      if (o.type === 'tijd') {
        const r = recordsTijdVoorOefening(sessies, o.id);
        if (!r) return '';
        return `
          <div class="kaart">
            <div class="rij"><span><b>${escapeHtml(o.naam)}</b> ${badgesHtml(o.spiergroepen)}</span></div>
            <div class="rij grijs" style="margin-top:8px"><span>🏅 Beste tijd</span><span style="color:var(--goud)">${formatTijd(r.besteTijd)} · ${datumKort(r.besteTijdDatum)}</span></div>
          </div>`;
      }
      const r = recordsVoorOefening(sessies, o.id);
      if (!r) return '';
      return `
        <div class="kaart">
          <div class="rij"><span><b>${escapeHtml(o.naam)}</b> ${badgesHtml(o.spiergroepen)}</span></div>
          <div class="rij grijs" style="margin-top:8px"><span>🏅 Beste 1RM</span><span style="color:var(--goud)">${formatKg(r.beste1rm)} kg · ${datumKort(r.beste1rmDatum)}</span></div>
          <div class="rij grijs" style="margin-top:4px"><span>🏋️ Zwaarste gewicht</span><span style="color:var(--accent)">${formatKg(r.besteGewicht)} kg · ${datumKort(r.besteGewichtDatum)}</span></div>
        </div>`;
    }).filter(Boolean).join('');
    document.getElementById('tab-records').innerHTML = `
      <h1>Records</h1>
      <p class="sub">Je persoonlijke toppers per oefening.</p>
      <div style="margin-top:12px">${kaarten || '<p class="grijs">Nog geen records. Log eerst wat sessies bij "Vandaag".</p>'}</div>
    `;
  }

  // ---- PR-viering ----
  let vieringAutoHide = null;
  function vierPR(naam, prTekst) {
    const el = document.getElementById('viering');
    el.innerHTML = `<div class="viering-banner"><span>🎉 Nieuw PR! ${escapeHtml(naam)} — ${prTekst}</span><button class="sluit" onclick="sluitViering()" aria-label="sluiten">×</button></div>` + confettiHtml();
    el.classList.remove('verborgen');
    if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
    if (vieringAutoHide) clearTimeout(vieringAutoHide);
    vieringAutoHide = setTimeout(sluitViering, 6000);
  }
  function sluitViering() {
    if (vieringAutoHide) { clearTimeout(vieringAutoHide); vieringAutoHide = null; }
    const el = document.getElementById('viering');
    el.classList.add('verborgen');
    el.innerHTML = '';
  }
  function confettiHtml() {
    const kleuren = ['#a78bfa','#38bdf8','#fbbf24','#34d399','#f87171'];
    let out = '';
    for (let i = 0; i < 28; i++) {
      const left = Math.round(Math.random() * 100);
      const kleur = kleuren[i % kleuren.length];
      const delay = (Math.random() * 0.4).toFixed(2);
      const dur = (1.2 + Math.random() * 0.8).toFixed(2);
      out += `<span class="confetti" style="left:${left}vw;background:${kleur};animation-duration:${dur}s;animation-delay:${delay}s"></span>`;
    }
    return out;
  }

  // ---- Rustklok ----
  let rustInterval = null, rustEind = 0, rustAutoHide = null;
  function startRust(sec) {
    if (rustInterval) clearInterval(rustInterval);
    if (rustAutoHide) { clearTimeout(rustAutoHide); rustAutoHide = null; }
    rustEind = Date.now() + sec * 1000;
    const el = document.getElementById('rustklok');
    el.innerHTML = `
      <span class="tijd">--</span>
      <button class="mini" onclick="verlengRust(30)">+30s</button>
      <span class="grijs" style="margin-left:auto">rust ⏱️</span>
      <button class="sluit" onclick="stopRust()" aria-label="sluiten">×</button>`;
    el.classList.remove('verborgen');
    rustInterval = setInterval(tikRust, 250);
    tikRust();
  }
  function tikRust() {
    const over = Math.max(0, Math.round((rustEind - Date.now()) / 1000));
    const tijd = document.querySelector('#rustklok .tijd');
    if (tijd) tijd.textContent = Math.floor(over / 60) + ':' + String(over % 60).padStart(2, '0');
    if (over <= 0) klaarRust();
  }
  function klaarRust() {
    if (rustInterval) { clearInterval(rustInterval); rustInterval = null; }
    if (navigator.vibrate) navigator.vibrate([120, 60, 120]);
    piep();
    // herbouw de balk met een duidelijke, goed aantikbare sluitknop
    const el = document.getElementById('rustklok');
    el.innerHTML = `
      <span class="tijd" style="color:var(--groen)">klaar! 💪</span>
      <button class="mini" style="margin-left:auto" onclick="stopRust()">sluiten ✕</button>`;
    // blijft staan tot je zelf sluit; ruime fallback zodat hij niet blijft hangen
    if (rustAutoHide) clearTimeout(rustAutoHide);
    rustAutoHide = setTimeout(stopRust, 60000);
  }
  function verlengRust(sec) {
    rustEind = Math.max(rustEind, Date.now()) + sec * 1000;
    if (!rustInterval) rustInterval = setInterval(tikRust, 250);
    document.getElementById('rustklok').classList.remove('verborgen');
    tikRust();
  }
  function stopRust() {
    if (rustInterval) { clearInterval(rustInterval); rustInterval = null; }
    if (rustAutoHide) { clearTimeout(rustAutoHide); rustAutoHide = null; }
    document.getElementById('rustklok').classList.add('verborgen');
  }
  function piep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; g.gain.value = 0.08; o.start();
      setTimeout(() => { o.stop(); ctx.close(); }, 200);
    } catch (e) {}
  }

  // ---- Supabase / authenticatie ----
  const SUPABASE_URL = 'https://yuyibqfykdfzmpeqfqtb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_Z1LqzJYtWC2GUv8V3Kceug_6wG44pat';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let huidigeGebruiker = null;
  let appGestart = false;

  async function stuurInloglink() {
    const email = (document.getElementById('login-email').value || '').trim();
    const st = document.getElementById('login-status');
    if (!email) { st.textContent = 'Vul je e-mailadres in.'; return; }
    st.textContent = 'Bezig met versturen…';
    const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href.split('#')[0] } });
    st.textContent = error ? ('Fout: ' + error.message) : '✅ Check je mail! Klik op de inloglink om in te loggen.';
  }
  async function uitloggen() {
    await sb.auth.signOut();
  }
  function toonIngelogd(ingelogd) {
    document.body.classList.toggle('uitgelogd', !ingelogd);
  }
  async function startApp() {
    if (appGestart) return;
    appGestart = true;
    await laadAllesUitCloud();  // data van deze gebruiker uit de cloud
    zaaiStartlijst();           // eerste keer: startlijst met 42 oefeningen
    renderVandaag();
  }

  sb.auth.onAuthStateChange((event, session) => {
    huidigeGebruiker = session ? session.user : null;
    toonIngelogd(!!session);
    if (session) startApp(); else appGestart = false;
  });

  (async () => {
    const { data } = await sb.auth.getSession();
    huidigeGebruiker = data.session ? data.session.user : null;
    toonIngelogd(!!data.session);
    if (data.session) startApp();
  })();
  </script>
